name: Generate Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: GooseOb/gh-user-stats@master
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: generated/

      - uses: actions/deploy-pages@v5
